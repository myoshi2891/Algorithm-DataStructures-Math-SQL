        <script type="text/babel">
            const { useState, useEffect, useRef } = React;

            /* ── Step data ── */
            const stepsData = [
                {
                    step: 1,
                    title: '問題を把握する',
                    desc: '無限チョコレートバーの「角（コーナー）」から始まる。チョコは 1×1 ピースとしてのみ提供可能。Alex は正確に k 回だけカットできる。最大何ピース取り出せるかを求める。',
                    visual: 'setup',
                },
                {
                    step: 2,
                    title: 'カットを分類する',
                    desc: 'k 回のカットを「水平カット h 回」と「垂直カット v 回」に分ける。h + v = k という制約がある。無限板なので外側の端がなく、囲まれた矩形領域のみが有限ピースになる。',
                    visual: 'classify',
                },
                {
                    step: 3,
                    title: 'ピース数の式を導く',
                    desc: '水平 h 回・垂直 v 回のカットで生まれる有限ピース数 = h × v。外側は無限に広がるため分離されず、カウントしない。目標は h × v を最大化すること（h + v = k の制約下）。',
                    visual: 'formula',
                },
                {
                    step: 4,
                    title: 'AM-GM 不等式を適用',
                    desc: 'AM-GM 不等式: √(h×v) ≤ (h+v)/2 = k/2。等号成立条件は h = v。整数制約より h = ⌊k/2⌋, v = ⌈k/2⌉ が最適。これが「均等に分割せよ」という直感に対応する。',
                    visual: 'amgm',
                },
                {
                    step: 5,
                    title: '最終公式を確認',
                    desc: 'answer(k) = (k // 2) × ((k+1) // 2)。k=5 なら (2)(3)=6、k=6 なら (3)(3)=9、k=7 なら (3)(4)=12、k=8 なら (4)(4)=16。サンプル出力と完全一致！',
                    visual: 'result',
                },
                {
                    step: 6,
                    title: 'Python で実装する',
                    desc: 'ビットシフト k >> 1 を使って k // 2 を高速化。1クエリ O(1) で完結。入力 t テストケースを読み込み、各 k に対して答えを書き出す。型注釈と docstring も完備。',
                    visual: 'code',
                },
            ];

            /* ── Visual components per step ── */
            function StepVisualization({ visual }) {
                const base = 'mt-5 rounded-2xl p-5 flex items-center justify-center';
                const dark = `${base} bg-[rgba(10,5,20,0.6)] border border-[rgba(251,146,60,0.2)] min-h-[160px]`;

                if (visual === 'setup') {
                    return (
                        <div className={dark}>
                            <svg
                                viewBox="0 0 300 160"
                                style={{ width: '100%', maxWidth: '300px', height: 'auto' }}
                            >
                                {/* Chocolate board corner */}
                                <rect
                                    x="20"
                                    y="20"
                                    width="260"
                                    height="130"
                                    rx="6"
                                    fill="#3b1e08"
                                    stroke="#fb923c"
                                    strokeWidth="1.5"
                                />
                                <text
                                    x="150"
                                    y="90"
                                    textAnchor="middle"
                                    dominantBaseline="middle"
                                    fontSize="13"
                                    fill="#fcd34d"
                                    fontWeight="bold"
                                >
                                    無限チョコレートバー
                                </text>
                                <text
                                    x="150"
                                    y="110"
                                    textAnchor="middle"
                                    dominantBaseline="middle"
                                    fontSize="10"
                                    fill="#fbbf24"
                                >
                                    角（コーナー）から無限に広がる 🎃
                                </text>
                                {/* corner mark */}
                                <circle cx="20" cy="20" r="5" fill="#fb923c" />
                                <text x="28" y="18" fontSize="9" fill="#fcd34d">
                                    コーナー
                                </text>
                                {/* arrows showing infinity */}
                                <text x="268" y="80" fontSize="18" fill="#fbbf24">
                                    →
                                </text>
                                <text x="140" y="145" fontSize="18" fill="#fbbf24">
                                    ↓
                                </text>
                                <text x="265" y="70" fontSize="11" fill="#94a3b8">
                                    ∞
                                </text>
                                <text x="155" y="140" fontSize="11" fill="#94a3b8">
                                    ∞
                                </text>
                            </svg>
                        </div>
                    );
                }

                if (visual === 'classify') {
                    return (
                        <div className={dark}>
                            <svg
                                viewBox="0 0 300 160"
                                style={{ width: '100%', maxWidth: '300px', height: 'auto' }}
                            >
                                <rect
                                    x="10"
                                    y="10"
                                    width="280"
                                    height="140"
                                    rx="6"
                                    fill="#1a0a2e"
                                    stroke="#374151"
                                    strokeWidth="1"
                                />
                                {/* horizontal cuts */}
                                <line
                                    x1="10"
                                    y1="55"
                                    x2="180"
                                    y2="55"
                                    stroke="#34d399"
                                    strokeWidth="2"
                                    strokeDasharray="4,2"
                                />
                                <line
                                    x1="10"
                                    y1="100"
                                    x2="180"
                                    y2="100"
                                    stroke="#34d399"
                                    strokeWidth="2"
                                    strokeDasharray="4,2"
                                />
                                {/* vertical cuts */}
                                <line
                                    x1="70"
                                    y1="10"
                                    x2="70"
                                    y2="140"
                                    stroke="#60a5fa"
                                    strokeWidth="2"
                                    strokeDasharray="4,2"
                                />
                                <line
                                    x1="130"
                                    y1="10"
                                    x2="130"
                                    y2="140"
                                    stroke="#60a5fa"
                                    strokeWidth="2"
                                    strokeDasharray="4,2"
                                />
                                <line
                                    x1="190"
                                    y1="10"
                                    x2="190"
                                    y2="140"
                                    stroke="#60a5fa"
                                    strokeWidth="2"
                                    strokeDasharray="4,2"
                                />
                                {/* labels */}
                                <text x="200" y="58" fontSize="10" fill="#34d399">
                                    h=2 本
                                </text>
                                <text x="200" y="103" fontSize="10" fill="#34d399">
                                    水平カット
                                </text>
                                <text
                                    x="130"
                                    y="148"
                                    textAnchor="middle"
                                    fontSize="9"
                                    fill="#60a5fa"
                                >
                                    v=3本 垂直
                                </text>
                                {/* finite pieces highlight */}
                                <rect
                                    x="10"
                                    y="10"
                                    width="60"
                                    height="45"
                                    rx="3"
                                    fill="rgba(251,191,36,0.15)"
                                    stroke="#fbbf24"
                                    strokeWidth="1"
                                />
                                <rect
                                    x="70"
                                    y="10"
                                    width="60"
                                    height="45"
                                    rx="3"
                                    fill="rgba(251,191,36,0.15)"
                                    stroke="#fbbf24"
                                    strokeWidth="1"
                                />
                                <rect
                                    x="130"
                                    y="10"
                                    width="50"
                                    height="45"
                                    rx="3"
                                    fill="rgba(251,191,36,0.15)"
                                    stroke="#fbbf24"
                                    strokeWidth="1"
                                />
                                <rect
                                    x="10"
                                    y="55"
                                    width="60"
                                    height="45"
                                    rx="3"
                                    fill="rgba(251,191,36,0.15)"
                                    stroke="#fbbf24"
                                    strokeWidth="1"
                                />
                                <rect
                                    x="70"
                                    y="55"
                                    width="60"
                                    height="45"
                                    rx="3"
                                    fill="rgba(251,191,36,0.15)"
                                    stroke="#fbbf24"
                                    strokeWidth="1"
                                />
                                <rect
                                    x="130"
                                    y="55"
                                    width="50"
                                    height="45"
                                    rx="3"
                                    fill="rgba(251,191,36,0.15)"
                                    stroke="#fbbf24"
                                    strokeWidth="1"
                                />
                                <text
                                    x="150"
                                    y="125"
                                    textAnchor="middle"
                                    fontSize="11"
                                    fill="#fbbf24"
                                    fontWeight="bold"
                                >
                                    有限ピース = h × v = 6 🍫
                                </text>
                            </svg>
                        </div>
                    );
                }

                if (visual === 'formula') {
                    return (
                        <div className={dark}>
                            <div
                                style={{
                                    textAlign: 'center',
                                    display: 'flex',
                                    flexDirection: 'column',
                                    gap: '0.75rem',
                                }}
                            >
                                <div
                                    style={{
                                        color: '#fdba74',
                                        fontFamily: "'JetBrains Mono',monospace",
                                        fontSize: '0.875rem',
                                    }}
                                >
                                    h + v = k &nbsp;&nbsp;(制約)
                                </div>
                                <div
                                    style={{
                                        fontSize: '1.5rem',
                                        fontWeight: '900',
                                        color: '#fbbf24',
                                        fontFamily: "'Outfit',sans-serif",
                                    }}
                                >
                                    ピース数 = h × v
                                </div>
                                <div style={{ color: '#e2e8f0', fontSize: '0.75rem' }}>
                                    外側（∞方向）は非分離 → カウント外
                                </div>
                                <div
                                    style={{
                                        background: 'rgba(251,146,60,0.1)',
                                        borderRadius: '0.75rem',
                                        padding: '0.75rem 1.5rem',
                                        border: '1px solid rgba(251,146,60,0.3)',
                                        display: 'inline-block',
                                    }}
                                >
                                    <span
                                        style={{
                                            color: '#fb923c',
                                            fontFamily: "'JetBrains Mono',monospace",
                                            fontSize: '0.875rem',
                                        }}
                                    >
                                        最大化: f(h) = h(k−h)
                                    </span>
                                </div>
                            </div>
                        </div>
                    );
                }

                if (visual === 'amgm') {
                    return (
                        <div className={dark}>
                            <div
                                style={{
                                    textAlign: 'center',
                                    display: 'flex',
                                    flexDirection: 'column',
                                    gap: '0.75rem',
                                    width: '100%',
                                    padding: '0 0.5rem',
                                }}
                            >
                                <div
                                    style={{
                                        color: '#6ee7b7',
                                        fontFamily: "'JetBrains Mono',monospace",
                                        fontSize: '0.75rem',
                                    }}
                                >
                                    AM-GM 不等式
                                </div>
                                <div
                                    style={{
                                        color: '#fde68a',
                                        fontFamily: "'JetBrains Mono',monospace",
                                        fontSize: '0.875rem',
                                    }}
                                >
                                    √(h×v) ≤ (h+v)/2 = k/2
                                </div>
                                <div
                                    style={{
                                        display: 'flex',
                                        justifyContent: 'center',
                                        gap: '1rem',
                                        marginTop: '0.5rem',
                                    }}
                                >
                                    {[
                                        { k: 5, h: 2, v: 3, p: 6 },
                                        { k: 6, h: 3, v: 3, p: 9 },
                                        { k: 7, h: 3, v: 4, p: 12 },
                                        { k: 8, h: 4, v: 4, p: 16 },
                                    ].map(({ k, h, v, p }) => (
                                        <div
                                            key={k}
                                            style={{
                                                borderRadius: '0.5rem',
                                                padding: '0.5rem',
                                                textAlign: 'center',
                                                background: 'rgba(251,191,36,0.1)',
                                                border: '1px solid rgba(251,191,36,0.3)',
                                            }}
                                        >
                                            <div style={{ fontSize: '10px', color: '#e2e8f0' }}>
                                                k={k}
                                            </div>
                                            <div style={{ fontSize: '10px', color: '#fdba74' }}>
                                                ({h},{v})
                                            </div>
                                            <div
                                                style={{
                                                    color: '#fbbf24',
                                                    fontWeight: 'bold',
                                                    fontSize: '0.875rem',
                                                }}
                                            >
                                                {p}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    );
                }

                if (visual === 'result') {
                    return (
                        <div className={dark}>
                            <div
                                style={{
                                    textAlign: 'center',
                                    display: 'flex',
                                    flexDirection: 'column',
                                    gap: '0.5rem',
                                    width: '100%',
                                }}
                            >
                                <div style={{ color: '#e2e8f0', fontSize: '0.75rem' }}>
                                    最終公式
                                </div>
                                <div
                                    style={{
                                        background: 'rgba(251,146,60,0.12)',
                                        border: '1px solid rgba(251,146,60,0.4)',
                                        borderRadius: '0.75rem',
                                        padding: '0.75rem 1.25rem',
                                        display: 'inline-block',
                                    }}
                                >
                                    <span
                                        style={{
                                            fontFamily: "'Outfit',sans-serif",
                                            fontWeight: '900',
                                            fontSize: '1.15rem',
                                            color: '#fde68a',
                                        }}
                                    >
                                        answer(k) = (k&gt;&gt;1) × ((k+1)&gt;&gt;1)
                                    </span>
                                </div>
                                <div
                                    style={{
                                        display: 'grid',
                                        gridTemplateColumns: 'repeat(4,1fr)',
                                        gap: '0.5rem',
                                        marginTop: '0.75rem',
                                    }}
                                >
                                    {[
                                        [5, 6],
                                        [6, 9],
                                        [7, 12],
                                        [8, 16],
                                    ].map(([k, ans]) => (
                                        <div
                                            key={k}
                                            style={{
                                                borderRadius: '0.5rem',
                                                paddingTop: '0.5rem',
                                                paddingBottom: '0.5rem',
                                                textAlign: 'center',
                                                background: 'rgba(52,211,153,0.1)',
                                                border: '1px solid rgba(52,211,153,0.3)',
                                            }}
                                        >
                                            <div style={{ fontSize: '10px', color: '#e2e8f0' }}>
                                                k={k}
                                            </div>
                                            <div style={{ color: '#34d399', fontWeight: 'bold' }}>
                                                {ans} ✓
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    );
                }

                if (visual === 'code') {
                    return (
                        <div className={`${dark} flex-col gap-2`}>
                            <div
                                style={{
                                    fontFamily: "'JetBrains Mono',monospace",
                                    fontSize: '0.75rem',
                                    color: '#e2e8f0',
                                    width: '100%',
                                    display: 'flex',
                                    flexDirection: 'column',
                                    gap: '0.25rem',
                                }}
                            >
                                <div>
                                    <span style={{ color: '#60a5fa' }}>def</span>{' '}
                                    <span style={{ color: '#fde68a' }}>halloweenParty</span>(
                                    <span style={{ color: '#fdba74' }}>k</span>:{' '}
                                    <span style={{ color: '#34d399' }}>int</span>) -&gt;{' '}
                                    <span style={{ color: '#34d399' }}>int</span>:
                                </div>
                                <div style={{ paddingLeft: '1rem', color: '#94a3b8' }}>
                                    # h = ⌊k/2⌋, v = ⌈k/2⌉
                                </div>
                                <div style={{ paddingLeft: '1rem' }}>
                                    <span style={{ color: '#60a5fa' }}>return</span> (k{' '}
                                    <span style={{ color: '#fb923c' }}>&gt;&gt;</span>{' '}
                                    <span style={{ color: '#4ade80' }}>1</span>) * ((k +{' '}
                                    <span style={{ color: '#4ade80' }}>1</span>){' '}

                                    marginTop: '0.25rem',
                                }}

                                ⏱ O(1) &nbsp;|&nbsp; 🧠 O(1)
                            </div>

import os


def halloweenParty(k: int) -> int:
    """
    無限チョコレートバーのコーナーから k 回のカットで
    得られる最大有限ピース数を返す。

    Theory:
        h 回水平カット + v 回垂直カット (h + v = k) → ピース数 = h × v
        AM-GM 不等式: h × v は h ≈ v のとき最大
        最適: h = ⌊k/2⌋, v = ⌈k/2⌉

    Formula:
        answer(k) = (k // 2) × ((k + 1) // 2)

    Args:
        k: カット回数 (1 ≤ k ≤ 10^9)
    Returns:
        最大チョコレートピース数 (LONG_INTEGER)

    Time Complexity:  O(1)
    Space Complexity: O(1)
    """
    # h = floor(k / 2)  ← 水平カット数（ビットシフトで高速化）
    h: int = k >> 1          # k // 2 と等価（非負整数）

    # v = ceil(k / 2)   ← 垂直カット数
    v: int = (k + 1) >> 1   # (k + 1) // 2 と等価

    # 有限ピース数 = h × v  ← AM-GM により最大
    return h * v


if __name__ == '__main__':
    fptr = open(os.environ['OUTPUT_PATH'], 'w')

    t = int(input().strip())

    for _ in range(t):
        k = int(input().strip())
        result = halloweenParty(k)
        fptr.write(str(result) + '\\n')

    fptr.close()`;
